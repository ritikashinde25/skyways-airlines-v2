version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: skyways-postgres
    environment:
      POSTGRES_DB: skyways_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: skyways-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: skyways-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: skyways-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Spring Boot Backend
  backend:
    build:
      context: ./backend/skyways-airlines
      dockerfile: Dockerfile
    container_name: skyways-backend
    depends_on:
      - postgres
      - mongodb
      - kafka
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skyways_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skyways-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  mongo-data: