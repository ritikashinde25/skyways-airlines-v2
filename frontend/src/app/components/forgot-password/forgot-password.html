<div class="auth-background">
  <div class="auth-card">
    <div class="auth-card-header">
      <h2>SkyWays</h2>
      <p>Airlines — Reset your password</p>
    </div>
    <div class="auth-card-body">

      <div *ngIf="message"
           [class]="isError ? 'alert alert-danger' :
                    'alert alert-success'">
        {{ message }}
      </div>

      <div *ngIf="!isSuccess">
        <p style="color: #555; font-size: 14px; margin-bottom: 20px;">
          Enter your registered email address and we will
          send you a password reset link.
        </p>

        <div class="mb-3">
          <label class="form-label fw-bold">Email Address</label>
          <input type="email" class="form-control"
                 [(ngModel)]="email"
                 placeholder="Enter your registered email"/>
        </div>

        <button class="btn-gold mb-3"
                (click)="onSubmit()"
                [disabled]="isLoading">
          {{ isLoading ? 'Sending...' : 'SEND RESET LINK' }}
        </button>
      </div>

      <div *ngIf="isSuccess" class="text-center">
        <div style="font-size: 60px; margin-bottom: 16px;">
          📧
        </div>
        <p style="color: #555; font-size: 14px;">
          Check your email for the reset link.
          The link will expire in 30 minutes.
        </p>
        <button class="btn-gold mt-3" (click)="goToLogin()">
          BACK TO LOGIN
        </button>
      </div>

      <div class="text-center mt-3">
        <span class="text-muted">Remember your password? </span>
        <a routerLink="/login">Login here</a>
      </div>

    </div>
  </div>
</div>
