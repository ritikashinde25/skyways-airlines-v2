<div class="auth-background">
  <div class="auth-card">
    <div class="auth-card-header">
      <h2>SkyWays</h2>
      <p>Airlines — Create your account</p>
    </div>
    <div class="auth-card-body">
      <div *ngIf="message"
           [class]="isError ? 'alert alert-danger' : 
                    'alert alert-success'">
        {{ message }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" class="form-control"
               [(ngModel)]="user.username"
               placeholder="Enter your username"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Email</label>
        <input type="email" class="form-control"
               [(ngModel)]="user.email"
               placeholder="Enter your email"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" class="form-control"
               [(ngModel)]="user.password"
               (input)="checkPasswordStrength(user.password)"
               placeholder="Enter your password"/>

        <!-- Password strength bar -->
        <div *ngIf="user.password" class="mt-2">
          <div style="height: 4px; border-radius: 2px; background: #dee2e6;">
            <div [style]="'height: 100%; border-radius: 2px; transition: all 0.3s; width: ' +
                          (passwordStrength === 'weak' ? '25%' :
                           passwordStrength === 'medium' ? '50%' :
                           passwordStrength === 'strong' ? '75%' : '100%') +
                          '; background: ' +
                          (passwordStrength === 'weak' ? '#e53935' :
                           passwordStrength === 'medium' ? '#f57c00' :
                           passwordStrength === 'strong' ? '#1976d2' : '#43a047')">
            </div>
          </div>
          <small [style]="'font-weight: 700; color: ' +
                          (passwordStrength === 'weak' ? '#e53935' :
                           passwordStrength === 'medium' ? '#f57c00' :
                           passwordStrength === 'strong' ? '#1976d2' : '#43a047')">
            {{ passwordStrength | titlecase }} password
          </small>
        </div>

        <!-- Password hints -->
        <div class="mt-2 p-2" style="background: #f8f9fa; border-radius: 8px;">
          <small class="d-block" [style.color]="user.password && user.password.length >= 8 ? '#43a047' : '#888'">
            &#10003; At least 8 characters
          </small>
          <small class="d-block" [style.color]="user.password && hasUpper(user.password) ? '#43a047' : '#888'">
            &#10003; At least 1 uppercase letter
          </small>
          <small class="d-block" [style.color]="user.password && hasLower(user.password) ? '#43a047' : '#888'">
            &#10003; At least 1 lowercase letter
          </small>
          <small class="d-block" [style.color]="user.password && hasNumber(user.password) ? '#43a047' : '#888'">
            &#10003; At least 1 number
          </small>
          <small class="d-block" [style.color]="user.password && hasSpecial(user.password) ? '#43a047' : '#888'">
            &#10003; At least 1 special character (!@#$%^&*)
          </small>
        </div>

      <button class="btn-gold mb-3" (click)="onRegister()">
        REGISTER
      </button>

      <div class="text-center">
        <span class="text-muted">Already have an account? </span>
        <a routerLink="/login">Login here</a>
      </div>
    </div>
  </div>
</div>
